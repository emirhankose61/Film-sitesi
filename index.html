    <!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmocMovieFullHdİzleYav</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Montserrat:400,700&display=swap">
    <style>
        body {
            background: #181818;
            font-family: 'Montserrat', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .navbar {
            background: #111;
            padding: 20px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar .logo {
            font-weight: bold;
            font-size: 1.7em;
            letter-spacing: 2px;
            color: #fff;
        }

        .navbar nav a {
            color: #eee;
            margin: 0 20px;
            text-decoration: none;
            transition: color 0.2s;
        }

        .navbar nav a:hover {
            color: #1ed760;
        }

        .container {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        .sidebar {
            width: 240px;
            background: #232323;
            padding: 40px 0 0 30px;
            box-sizing: border-box;
            border-right: 1px solid #232323;
            min-height: 100vh;
        }

        .sidebar h3 {
            margin-top: 40px;
            color: #999;
            letter-spacing: 1px;
            font-size: 0.9em;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
            margin: 1pc 0 0 0;
        }

        .sidebar ul li {
            margin-bottom: 16px;
        }

        .sidebar ul li a {
            color: #ccc;
            text-decoration: none;
            font-size: 1em;
            padding: 4px 0;
            display: block;
            transition: color 0.2s;
        }

        .sidebar ul li a:hover {
            color: #1ed760;
        }

        .main-content {
            flex: 1;
            padding: 50px 50px 0 50px;
        }

        .section-title {
            font-size: 1.4em;
            font-weight: 700;
            height: 60px;
            color: #fff;
            letter-spacing: 1px;
        }

        .film-count {
            color: #aaa;
            font-weight: 400;
            margin-left: 12px;
        }

        .film-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 28px;
            margin-bottom: 40px;
        }

        .film-card {
            background: #232323;
            border-radius: 10px;
            overflow: hidden;
            transition: box-shadow 0.2s, transform 0.2s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            cursor: pointer;
            display: flex;
            position: relative;
            flex-direction: column;
        }

        .film-card:hover {
            box-shadow: 0 6px 18px rgba(30, 215, 96, 0.13);
            transform: translateY(-6px)scale(1.03);
        }

        .film-card img {
            width: 100%;
            height: 305px;
            object-fit: cover;
            display: block;
        }

        .film-card .title {
            padding: 15px;
            font-size: 1.02em;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.5px;
            flex: 1;
            display: flex;
            align-items: center;
        }

        #dahaFazlaYukle {
            background: #1ed760;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            display: block;
            margin: 30px auto;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease;
        }

        #dahaFazlaYukle:hover {
            background: #17b34e;
            transform: scale(1);
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            opacity: 0;
            transition: all 0.2s ease-in-out;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }

        .film-card:hover .overlay {
            opacity: 1;
        }

        .overlay .title {
            font-weight: bold;
            font-size: 1rem;
        }

        .overlay .metn {
            font-size: 0.85rem;
            color: #ccc;
        }

        .overlay .blg {
            font-size: 0.8rem;
            color: #ddd;
            margin-top: 6px;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <span class="logo">EmocMovie<span style="color:#1ed760">.tv</span></span>
        <nav>
            <a href="index.html">Anasayfa</a>
            <a href="#">Kategoriler</a>
            <a href="#">Diziler</a>
            <a href="#">Filmler</a>
            <a href="indexs.html">Tüm İçerikler</a>
        </nav>
    </div>

    <div class="container">
        <aside class="sidebar">
            <h3>Size Özel</h3>
            <ul>
                <li><a href="#">Listem</a></li>
                <li><a href="#">Öneriler</a></li>
                <li><a href="#">Popüler</a></li>
                <li><a href="#">Yeni Gelenler</a></li>
            </ul>
            <h3>Kategoriler</h3>
            <ul>
                <li><a href="#">Dizi</a></li>
                <li><a href="#">Film</a></li>
                <li><a href="#">Aile</a></li>
                <li><a href="#">Dram</a></li>
                <li><a href="#">Komedi</a></li>
                <li><a href="#">Aksiyon</a></li>
                <li><a href="#">Gençlik</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="film-grid" id="filmGrid"></div>
            <div class="section-title">
                Film<span class="film-count"></span>
            </div>
            <button id="dahaFazlaYukle">Daha Fazla Yükle</button>
        </main>
    </div>

    <script>

        const movies = [
            { title: "Inception", img: "img/ınception.jpg", year: 2010, genre: "Bilim Kurgu", rating: 8.8, desc: "Rüya içinde rüya konseptiyle bilinçaltına yolculuk yapan bir hırsızın hikayesi." },
            { title: "The Matrix", img: "img/matrıx.jpg", year: 1999, genre: "Bilim Kurgu / Aksiyon", rating: 8.7, desc: "Gerçek dünya ile simülasyon arasındaki farkı keşfeden bir hackerın özgürlük mücadelesi." },
            { title: "Interstellar", img: "img/ınterstellar.jpg", year: 2014, genre: "Bilim Kurgu / Dram", rating: 8.6, desc: "İnsanlığın yeni bir yaşam alanı bulmak için galaksiler arası yolculuğa çıkan bir ekibin destanı." },
            { title: "Parasite", img: "img/parasıte.jpg", year: 2019, genre: "Dram / Gerilim", rating: 8.5, desc: "Fakir bir ailenin zengin bir ailenin hayatına sızarak kurduğu tehlikeli dengeler." },
            { title: "The Godfather", img: "img/thegodfather.jpg", year: 1972, genre: "Suç / Dram", rating: 9.2, desc: "Corleone ailesinin güç, sadakat ve ihanet üzerine kurulu mafya hikayesi." },
            { title: "Tenet", img: "img/tenet.jpg", year: 2020, genre: "Bilim Kurgu / Aksiyon", rating: 7.3, desc: "Zamanın akışını tersine çevirerek küresel felaketi önlemeye çalışan bir ajanın hikayesi." },
            { title: "Pulp Fiction", img: "img/pulpf.jpg", year: 1994, genre: "Suç / Dram", rating: 8.9, desc: "Los Angeles'ta geçen birbirine bağlı suç hikayelerinin Quentin Tarantino imzalı klasiği." },
            { title: "Gladiator", img: "img/Gladiator.jpg", year: 2000, genre: "Aksiyon / Dram", rating: 8.5, desc: "Roma İmparatorluğu’nda ihanete uğrayan bir generalin intikam mücadelesi." },
            { title: "Avatar", img: "img/Avatar.jpg", year: 2009, genre: "Bilim Kurgu / Macera", rating: 7.9, desc: "Pandora gezegeninde yerli halkla insan kolonistleri arasındaki epik savaş." },
            { title: "Fight Club", img: "img/fight.jpg", year: 1999, genre: "Dram / Gerilim", rating: 8.8, desc: "Tüketim toplumuna başkaldıran yeraltı dövüş kulübünün karizmatik liderleri." },
            { title: "Joker", img: "img/joker.jpg", year: 2019, genre: "Dram / Suç", rating: 8.4, desc: "Toplumun dışladığı Arthur Fleck’in Joker’e dönüşüm hikayesi." },
            { title: "Dune", img: "img/dune.jpg", year: 2021, genre: "Bilim Kurgu / Macera", rating: 8.0, desc: "Çöl gezegeni Arrakis’te geçen güç ve kader mücadelesi." },
            { title: "Iron Man 3", img: "img/ıronman.jpg", year: 2013, genre: "Aksiyon / Bilim Kurgu", rating: 7.1, desc: "Tony Stark’ın geçmişiyle yüzleştiği ve Mandarin tehdidiyle mücadele ettiği macera." },
            { title: "Venom", img: "img/venom.jpg", year: 2018, genre: "Aksiyon / Bilim Kurgu", rating: 6.6, desc: "Gazeteci Eddie Brock’un, uzaylı simbiyont Venom ile kurduğu sıra dışı bağ." },
            { title: "Ford v Ferrari", img: "img/fordvferrari.jpg", year: 2019, genre: "Aksiyon / Tarih", rating: 7.6, desc: "Gerçek bir hikayeden uyarlanan bu filmde, vizyoner araba tasarımcısı Carroll Shelby ve korkusuz şoför Ken Miles, 1966'daki Le Mans'ta Enzo Ferrari'nin yarış arabalarına karşı yarışır."},
            { title: "Demon Slayer", img: "img/dm.jpg", year: 2018, genre: "Aksiyon / Bilim Kurgu", rating: 6.6, desc: "iblis öldüren kırmızı kafalı piç" }
        ];

        const grid = document.getElementById("filmGrid");
        const filmCount = document.querySelector('.film-count');
        const yukleBtn = document.getElementById("dahaFazlaYukle");

        let currentIndex = 0;
        const pageSize = 9;

        function yukleMovies() {
            const movieler = movies.slice(currentIndex, currentIndex + pageSize);

            movieler.forEach(movie => {
                const div = document.createElement("div");
                div.className = "film-card";
                div.innerHTML = `<img src="${movie.img}" alt="${movie.title}">
            <div class="overlay">
                <div class="title">${movie.title}</div>
                <div class="metn">${movie.genre} • ${movie.year} • ⭐ ${movie.rating}</div>
                <div class="blg">${movie.desc}</div>
            </div>`;
        
                grid.appendChild(div);
            });

            currentIndex += pageSize;
            filmCount.textContent = movies.length + " adet sonuç bulundu";

            if (currentIndex >= movies.length) {
                yukleBtn.style.display = "none";
            }
        }

        yukleMovies();
        yukleBtn.addEventListener("click", yukleMovies);

    </script>
</body>

</html>
